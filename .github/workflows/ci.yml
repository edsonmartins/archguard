name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: archguard-console

jobs:
  ci:
    name: typecheck + build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: archguard-console/.nvmrc
          cache: npm
          cache-dependency-path: archguard-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Production build (vite client + server)
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: archguard-console/coverage
          retention-days: 14
          if-no-files-found: ignore
